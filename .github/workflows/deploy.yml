name: github-pages

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      submodules: true

  - name: Install Zola 0.20
    run: |
      wget https://github.com/getzola/zola/releases/download/v0.20.0/zola-v0.20.0-x86_64-unknown-linux-gnu.tar.gz
      tar -xzf zola-v0.20.0-x86_64-unknown-linux-gnu.tar.gz
      sudo mv zola /usr/local/bin/zola
      zola --version

  - name: Build site
    run: zola build

  - name: Deploy to GitHub Pages
    uses: peaceiris/actions-gh-pages@v4
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: ./public

